<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Hyrule Compendium</title>
  </head>
  <body>
    <main>
      <h1 class="title">Hyrule Compendium</h1>
      <div id="category-buttons">
        <button data-category="monsters">Monsters</button>
        <button data-category="equipment">Equipment</button>
        <button data-category="creatures">Creatures</button>
      </div>
      <input type="text" id="search-input" placeholder="Search monsters..." />
      <div id="loading" class="hidden">Loading...</div>
      <div id="card-container"></div>
      <div id="modal" class="hidden">
        <div id="modal-content">
          <button id="close-modal" class="close-btn">✕</button>

          <div class="modal-body">
            <img id="modal-image" src="" alt="" />

            <div class="modal-text">
              <h2 id="modal-name"></h2>
              <p id="modal-description"></p>

              <p id="modal-extra"></p>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="./script.js"></script>
  </body>
</html>
